repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-json
      - id: pretty-format-json
        args: ["--no-sort-keys"]
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
  - repo: local
    hooks:
      - id: format
        name: format
        entry: npm run format:check
        language: system
        pass_filenames: false
      - id: lint
        name: lint
        entry: npm run lint
        language: system
        pass_filenames: false
      - id: type-check
        name: type check
        entry: npm run typecheck
        language: system
        pass_filenames: false
      - id: frontend-tests
        name: frontend tests
        entry: npm test
        language: system
        pass_filenames: false
      - id: backend-tests
        name: backend tests
        entry: bash -c 'cd mana-hyderabad-backend && pytest'
        language: system
        pass_filenames: false
