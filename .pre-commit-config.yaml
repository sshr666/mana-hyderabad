repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
  - repo: local
    hooks:
      - id: frontend-format-check
        name: frontend format check
        entry: npm run format:check
        language: system
        pass_filenames: false
      - id: frontend-tests
        name: frontend tests
        entry: npm test
        language: system
        pass_filenames: false
      - id: backend-tests
        name: backend tests
        entry: bash -c 'cd mana-hyderabad-backend && pytest'
        language: system
        pass_filenames: false
