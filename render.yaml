databases:
  - name: mana-hyderabad-db
    databaseName: mana_hyderabad
    user: mana_hyderabad
    plan: free

services:
  - type: web
    name: mana-hyderabad-api
    runtime: python
    rootDir: mana-hyderabad-backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mana-hyderabad-db
          property: connectionString
      - key: FRONTEND_ORIGINS
        value: https://mana-hyderabad.vercel.app
      - key: ENABLE_TRANSLATION
        value: "false"
      - key: ENABLE_SPEECH_INPUT
        value: "false"
      - key: ENABLE_TTS_RESPONSES
        value: "false"
      - key: ENABLE_LLM_ANALYSIS
        value: "false"
      - key: ENABLE_DUPLICATE_DETECTION
        value: "false"
      - key: ENABLE_VISION_ANALYSIS
        value: "false"
      - key: ENABLE_RULE_FALLBACK
        value: "true"
